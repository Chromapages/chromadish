# Render Blueprint for Frontend-only deployment
# The backend is hosted on Hostinger VPS

services:
  # Frontend Static Site
  - type: web
    name: chromadish-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false
        # When deploying, set this to your VPS backend URL (e.g., https://api.yourdomain.com)
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
